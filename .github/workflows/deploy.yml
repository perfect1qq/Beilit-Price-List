name: Deploy Stable

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install deps
        run: npm install

      # 🔍 打印变量（方便排查）
      - name: Debug ENV
        run: |
          echo "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}"

      # ❗ 如果变量不存在就直接失败
      - name: Check ENV
        run: |
          if [ -z "${{ vars.VITE_API_BASE_URL }}" ]; then
            echo "❌ VITE_API_BASE_URL is NOT set!"
            exit 1
          else
            echo "✅ ENV OK"
          fi

      # ✅ 写入 env 文件
      - name: Create .env.production
        run: |
          echo "VITE_API_BASE_URL=${{ vars.VITE_API_BASE_URL }}" > .env.production
          cat .env.production

      - name: Build
        run: npm run build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist